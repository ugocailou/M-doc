# Configuration Netlify — Archives Médicales Flankin

[build]
  # Le site est un simple dossier statique + fonctions.
  publish = "public"
  functions = "netlify/functions"

# Redirige les anciennes URL de fonction vers le chemin propre si besoin
[[redirects]]
  from = "/api/records"
  to = "/.netlify/functions/records"
  status = 200
  force = false
